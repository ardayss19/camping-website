<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat"
      rel="stylesheet"
    />

    <title>Homepage</title>
  </head>
  <body>
    <nav></nav>
    <section id="aboutUs"></section>
    <section id="bestSeller">
      <div class="bestSeller__container">
        <h2>Our Best-Selling Products</h2>
        <div
          id="carouselExampleControlsNoTouching"
          class="carousel slide"
          data-bs-touch="false"
        >
          <div class="carousel-inner">
            <div class="carousel-item active">
              <div class="card">
                <div class="img-wrapper">
                  <img
                    src="images/Popuptent.webp"
                    class="card-img-top"
                    alt="..."
                  />
                </div>

                <div class="card-body">
                  <p class="card-text">Pop-Up Two Person Tent £35.99</p>
                </div>
              </div>
            </div>
            <div class="carousel-item">
              <div class="card">
                <div class="img-wrapper">
                  <img
                    src="./images/sleepingbag.webp"
                    class="card-img-top"
                    alt="..."
                  />
                </div>

                <div class="card-body">
                  <p class="card-text">Single Sleeping Bag £14.99</p>
                </div>
              </div>
            </div>
            <div class="carousel-item">
              <div class="card">
                <div class="img-wrapper">
                  <img
                    src="./images/CampingStove (1).webp"
                    class="card-img-top"
                    alt="..."
                  />
                </div>

                <div class="card-body">
                  <p class="card-text">Portable Gas Stove £21.99</p>
                </div>
              </div>
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleControlsNoTouching"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleControlsNoTouching"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
    </section>
    <section id="experiences"></section>
    <section id="calender"></section>
    <section id="ourPromises"></section>

    <footer>
      <div class="company"></div>
      <div></div>
    </footer>
  </body>
</html>
